name: club_india_user
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

  # Local Notifications
  flutter_local_notifications: ^19.0.0

  # Permission handler
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.5
  cloud_firestore: ^6.3.0
  http: ^1.6.0
  geolocator: ^14.0.2
  intl: ^0.20.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/badacoinuser.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/logo/badacoinuser.jpg